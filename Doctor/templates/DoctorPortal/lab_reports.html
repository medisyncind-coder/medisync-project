{% extends 'DoctorPortal/base.html' %}
{% load static %}

{% block content %}

<link rel="stylesheet" href="{% static 'Doctor/lab_reports.css' %}">

<div class="lab-container">

<h2>Lab Reports</h2>

<div class="reports-grid">

{% for report in reports %}

<div class="report-card">

<h3>{{ report.patient_name }}</h3>

<p>{{ report.created_at }}</p>

<a href="{{ report.report_file.url }}" target="_blank" class="download-btn">
Download Report
</a>

</div>

{% endfor %}

</div>

</div>

{% endblock %}
