{% extends 'DoctorPortal/base.html' %}

{% block content %}

<div class="payments-container">

<h2>Earnings Dashboard</h2>

<div class="stats">

<div class="card">
<h3>Total Earnings</h3>

</div>

</div>

{% endblock %}
