{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Doctor Login</title>
    <link rel="stylesheet" href="{% static 'Doctor/doctor_login.css' %}">
</head>
<body>

<div class="login-wrapper">
    <div class="login-card">
        <h2>Doctor Login</h2>

        <form method="post" action="{% url 'do_doctor_login' %}">
            {% csrf_token %}

            <div class="input-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="doctor@example.com" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="login-btn">Login</button>
        </form>

        <p class="hint-text">
            New Doctor? <a href="{% url 'doctor_register' %}">Register here</a>
        </p>
    </div>
</div>

</body>
</html>
