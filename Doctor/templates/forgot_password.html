{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Reset your MediSync account password.">
<title>Forgot Password — MediSync</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{
    min-height:100vh;display:flex;justify-content:center;align-items:center;
    background:linear-gradient(270deg,#00c6ff,#0072ff,#6a11cb,#2575fc);
    background-size:800% 800%;animation:gradientBG 10s ease infinite;
}
@keyframes gradientBG{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
.box{
    width:380px;padding:40px;border-radius:20px;
    background:rgba(255,255,255,0.15);backdrop-filter:blur(15px);
    box-shadow:0 10px 30px rgba(0,0,0,0.4);color:#fff;
}
.box h2{text-align:center;margin-bottom:8px;font-size:22px;}
.box p.sub{text-align:center;font-size:13px;color:rgba(255,255,255,0.8);margin-bottom:24px;}
.input-group{margin-bottom:20px;}
.input-group input{
    width:100%;padding:12px;border:none;border-radius:10px;
    background:rgba(255,255,255,0.2);color:#fff;outline:none;font-size:14px;
}
.input-group input::placeholder{color:#ddd;}
.btn{
    width:100%;padding:12px;border:none;border-radius:10px;
    background:linear-gradient(45deg,#00c6ff,#0072ff);color:#fff;
    cursor:pointer;font-size:15px;font-weight:500;transition:0.3s;
}
.btn:hover{box-shadow:0 5px 20px rgba(0,114,255,0.6);}
.message{padding:10px;border-radius:8px;font-size:13px;margin-bottom:14px;text-align:center;}
.message.success{background:rgba(40,167,69,0.8);}
.message.error{background:rgba(255,77,77,0.8);}
.links{margin-top:18px;text-align:center;font-size:13px;}
.links a{color:#fff;text-decoration:none;}
.links a:hover{text-decoration:underline;}
</style>
</head>
<body>
<div class="box">
    <h2>Forgot Password?</h2>
    <p class="sub">Enter your registered email and we'll send a reset link.</p>

    {% if messages %}
        {% for message in messages %}
            <div class="message {{ message.tags }}">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <form method="POST" action="{% url 'forgot_password' %}">
        {% csrf_token %}
        <div class="input-group">
            <input type="email" name="email" placeholder="Enter your email" required autofocus>
        </div>
        <button type="submit" class="btn">Send Reset Link</button>
    </form>

    <div class="links">
        <p>Remembered it? <a href="{% url 'patient_login' %}">Login</a></p>
    </div>
</div>
</body>
</html>
