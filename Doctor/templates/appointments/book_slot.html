{% load static %}
<!DOCTYPE html>
<html>

<head>

<title>Book Appointment</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="{% static 'Doctor/book_slot.css' %}">

</head>


<body>

<div class="booking-card">

<h1 class="page-title">Book Appointment</h1>

<!-- Doctor Info -->

<div class="doctor-section">

<h2>Dr. {{ doctor.name }}</h2>

<p>{{ doctor.specialization }}</p>

<div id="avail-badge" style="margin:14px 0;text-align:center;">
    <span style="color:#94a3b8;font-size:13px;">Checking availability...</span>
</div>

<script>
(function checkAvailability() {
    fetch('/doctor/live-status/{{ doctor.id }}/')
        .then(res => res.json())
        .then(data => {
            const badge = document.getElementById('avail-badge');
            if (!badge) return;
            if (data.is_available) {
                badge.innerHTML = '<span style="background:#bbf7d0;color:#065f46;padding:6px 16px;border-radius:20px;font-size:13px;font-weight:600;">✓ Doctor is Available — ' + data.total_queue + ' patient(s) in queue</span>';
            } else {
                badge.innerHTML = '<span style="background:#fde68a;color:#92400e;padding:6px 16px;border-radius:20px;font-size:13px;font-weight:600;">⚠ Doctor is Currently Busy — ' + data.total_queue + ' patient(s) waiting</span>';
            }
        })
        .catch(function() {});
    setTimeout(checkAvailability, 30000);
})();
</script>

</div>


<!-- Slots -->

{% if slots %}

<div class="slots-container">

{% for slot in slots %}

<a href="{% url 'confirm_booking' doctor.id slot|time:'H:i:s' %}" class="slot-link">

<div class="slot-btn">

{{ slot|time:"g:i A" }}

</div>

</a>

{% endfor %}

</div>

{% else %}

<div class="no-slot">

Doctor is not available today

</div>

{% endif %}


<!-- Back Button -->

<div class="back-btn">

<a href="{% url 'doctor_detail' doctor.id %}">

← Back to Doctor

</a>

</div>

</div>


<script>

const slots = document.querySelectorAll(".slot-btn");

slots.forEach(slot => {

slot.addEventListener("click", function(){

slots.forEach(s => s.classList.remove("selected"));

this.classList.add("selected");

});

});

</script>


</body>
</html>
