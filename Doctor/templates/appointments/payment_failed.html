{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Failed — MediSync</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f1f5f9;}
    .card{background:#fff;border-radius:20px;padding:40px;width:100%;max-width:400px;box-shadow:0 4px 24px rgba(0,0,0,0.1);text-align:center;}
    .icon{font-size:56px;margin-bottom:16px;}
    h2{font-size:22px;font-weight:700;color:#1e293b;margin-bottom:8px;}
    p{font-size:14px;color:#64748b;margin-bottom:28px;}
    .btn{display:inline-block;padding:12px 28px;border-radius:10px;background:#ef4444;color:#fff;text-decoration:none;font-weight:600;font-size:14px;}
    .btn:hover{opacity:0.9;}
    </style>
</head>
<body>
<div class="card">
    <div class="icon">❌</div>
    <h2>Payment Failed</h2>
    <p>Your payment could not be verified. No amount has been deducted. Please try again.</p>
    <a href="{% url 'home' %}" class="btn">Go Home</a>
</div>
</body>
</html>
